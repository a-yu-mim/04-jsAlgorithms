<!DOCTYPE html>
<html lang="pt_BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h2>Financiamento da Casa própria</h2>

    Qual o valor da renda familiar:
    <input type="text" id="input_renda"><br><br>

    Qual o valor da prestação :
    <input type="text" id="input_prestacao"><br><br>

    <button onclick="calculo()">Verificar financiamento</button>
    <div id="div_mensagem"></div>
</body>
</html>

<script>
    function calculo(){
        let renda = Number(input_renda.value);
        let prestacao = Number(input_prestacao.value);
        let porcentagem = prestacao/renda * 100;

        div_mensagem.innerHTML = `A prestação corresponde a ${porcentagem}% da renda familiar`;
        
        if(porcentagem > 30){
        div_mensagem.innerHTML += `<br><b><span style="color: red;">Será necessário complementar a renda familiar</b></span>`; 
        }

    }
</script>
