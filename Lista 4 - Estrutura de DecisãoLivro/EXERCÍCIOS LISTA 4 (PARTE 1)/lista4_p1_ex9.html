<!DOCTYPE html>
<html lang="pt_BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h2>Controle de peso no elevador</h2>

    Quantos homens entraram no elevador :
    <input type="text" id="input_homens"><br><br>

    Quantas mulheres entraram no elevador :
    <input type="text" id="input_mulheres"><br><br>

    <button onclick="calculo()">Analisar peso</button>
    <div id="div_mensagem"></div>
</body>
</html>

<script>
    function calculo(){
        let homens = Number(input_homens.value);
        let mulheres = Number(input_mulheres.value);
        let peso = homens * 80 + mulheres * 60;

        div_mensagem.innerHTML = `<br>Este elevador suporta 800 Kg e o peso estimado desta lotação é de ${peso}kg`;
       
        if(peso > 800){
        div_mensagem.innerHTML += `<br><span style="color: blue;">Será necessário que alguém desça para que o elevador se movimente</span>`; 
        }

    }
</script>
