<!DOCTYPE html>
<html lang="pt_BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h2>Controle de Refrigerante</h2>

    Quantas latinhas de refrigerante toma por dia?
    <input type="text" id="input_lata">
    <button onclick="calculo()">Quantos refris?</button>
    <div id="div_mensagem"></div>
</body>
</html>

<script>
    function calculo(){
        let lata = Number(input_lata.value);
        let totalAno = lata * 365

        div_mensagem.innerHTML = `<br>Você consome ${totalAno} latinhas por ano.`;

        if(totalAno >= 500){
        div_mensagem.innerHTML += `<br>Cuidado com a diabetes!`;
        }
    }
</script>
