<!DOCTYPE html>
<html lang="pt_BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h2>Controle de notas</h2>

    Nota 1:
    <input type="text" id="input_nota1"><br>
    Nota 2:
    <input type="text" id="input_nota2"><br>
    Nota 3:
    <input type="text" id="input_nota3">

    <button onclick="calculo()">Analisar desempenho</button>
    <div id="div_mensagem"></div>
</body>
</html>

<script>
    function calculo(){
        let n1 = Number(input_nota1.value);
        let n2 = Number(input_nota2.value);
        let n3 = Number(input_nota3.value);
        let media = (n1+n2+n3)/3;

        div_mensagem.innerHTML = `<br>Sua média foi de ${media}.`;

        if(media > 9.4){
        div_mensagem.innerHTML += `<br>Parabéns, você é fora de série!`;
        }
    }
</script>
