<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h2>Altura e Esportes: Descubra Sua Vantagem Competitiva</h2>

    Altura:
    <input type="text" id="input_altura">
    <button onclick="analisar()">Analisar Estatura</button>
    <div id="div_mensagem"></div>
</body>
</html>
<script>
    function analisar() {
        let altura = Number(input_altura.value);

        if(altura <= 1.65){
            div_mensagem.innerHTML = `Você pode ser piloto de corrida`;
        } else if(altura <= 1.8) {
             div_mensagem.innerHTML = `Você pode ser jogador de futebol`;
        } else {
             div_mensagem.innerHTML = `Você pode ser jogador de vôlei ou basquete`;
        }
    }
</script>
