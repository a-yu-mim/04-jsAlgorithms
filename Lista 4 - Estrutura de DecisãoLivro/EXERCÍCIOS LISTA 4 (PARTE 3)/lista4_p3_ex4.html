<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h2> Avaliação de Peso Infantil: Está Dentro da Faixa Saudável? </h2>
     
    Peso da criança:
    <input type="text" id="input_peso">
    <button onclick="analisar()">Analisar peso</button>
    <div id="div_mensagem"></div>
</body>
</html>
<script>
    function analisar() {
        let peso = Number(input_peso.value);

        if(peso <= 13.5){ //até 13.5
            div_mensagem.innerHTML = `Abaixo do peso`;
        } else if(peso <= 21.2) { // maior que 13.5 e até 21.2
             div_mensagem.innerHTML = `Peso na média`;
        } else { // maior que 21.2 
             div_mensagem.innerHTML = `Acima do peso`;
        }

        if(peso == 18.3) { 
             div_mensagem.innerHTML = `Peso perfeito`;
        } 
    }
</script>
