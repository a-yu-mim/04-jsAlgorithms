<!DOCTYPE html>
<html lang="pt_BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h2>Par ou Impar</h2>

    Número :
    <input type="text" id="input_num"><br><br>

    <button onclick="calculo()">Analisar</button>
    <div id="div_mensagem"></div>
</body>
</html>

<script>
    function calculo(){
        let num = Number(input_num.value);
        let conta = num % 2;

        if(conta == 0){
        div_mensagem.innerHTML = `<br><span style="color: red; background-color: yellow;">Esse número é PAR</span>`;
        }else{ 
            div_mensagem.innerHTML = `<br><b><span style="color: blue;"> Esse número é impar</b>`;
        }
    }
</script>
