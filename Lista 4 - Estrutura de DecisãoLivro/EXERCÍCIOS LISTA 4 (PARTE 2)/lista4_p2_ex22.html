<!DOCTYPE html>
<html lang="pt_BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h2>Análise de temperatura</h2>

    Qual a temperatura do ambiente:
    <input type="text" id="input_temp"><br><br>

    <button onclick="calculo()">Verificar clima</button>
    <div id="div_mensagem"></div>
</body>
</html>

<script>
    function calculo(){
        let temp = Number(input_temp.value);

        if(temp < 10){
        div_mensagem.innerHTML = `<img src="./imagem/apropriado.jpg" alt="">`;
         }else{
        div_mensagem.innerHTML = `<img src="./imagem/inapropriado.jpg" alt="">`;
         }
        }

</script>
