<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <h2>Desempenho Escolar: O Aluno Foi Aprovado?</h2>

    Nota :
    <input type="text" id="input_nota" /> <br /><br />

    Frequência :
    <input type="text" id="input_frequencia" /> <br /><br />

    <button onclick="calculo()">Analisar aluno</button>
    <div id="mensagem"></div>
  </body>
</html>
<script>
  function calculo() {
    let nota = Number(input_nota.value);
    let frequencia = Number(input_frequencia.value);

    if (nota < 0 || nota > 10) {
      alert(`Onde já se viu nota <0 ou >10?!`);
    } else if (nota > 0 && nota < 6) {
      mensagem.innerHTML = `<br>Aluno ficou abaixo da média`;
    } else if (nota >= 6 && nota <= 8) {
      mensagem.innerHTML = `<br>Aluno ficou na média`;
    } else if (nota > 8 && nota <= 10) {
      mensagem.innerHTML = `<br>Aluno ficou na média`;
    } 
    
    if (frequencia < 0 || frequencia > 100) {
      alert(`Onde já se viu frequência <0 ou >100?!`);
    } else if (frequencia >= 75) {
      alert(`Aluno aprovado por frequência`);
    } else {
      alert(`Aluno reprovado por frequência`);
    }
  }
</script>
