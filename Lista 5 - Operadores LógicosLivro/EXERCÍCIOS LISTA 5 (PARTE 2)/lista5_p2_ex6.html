<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h2>Aprovação Escolar: Notas e Frequência Fazem a Diferença!</h2>
    
    Nota do aluno : 
    <input type="text" id="input_nota"><br><br>

    Frequência do aluno : 
    <input type="text" id="input_frequencia"><br><br>

    <button onclick="calculo()">Avaliar aluno</button>

</body>
</html>
<script>
    function calculo(){
        let nota = Number(input_nota.value);
        let frequencia = Number(input_frequencia.value);

        if(nota >= 6 && frequencia >= 75){
            alert(`Parabéns! Aprovado!`);
            } else {
            alert(`Infelizmente, não foi desta vez`);
            }
    }
    
</script>
