<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h2>Recarga Fidelidade Metrô: Economize com Descontos Especiais!</h2>
    
    Quantidade de passagens: 
    <input type="number" id="input_qtd"><br><br>

    <button onclick="compra()">Comprar</button>
    <div id="mensagem"></div>

</body>
</html>
<script>
    function compra(){
        let qtd = Number(input_qtd.value);
        let valorPassagem = 4.40;
        let desconto = 0;
        
        if(qtd < 8 || qtd > 50){
            alert(`Quantidade inválida para o Fidelidade!`);
        } else{}

        if(qtd >= 8 && qtd <= 19){
            desconto = 0.03;
        } else if(qtd >= 20 && qtd <= 49){
            desconto = 0.05;
        } else if(qtd == 50){
            desconto = 0.07;
        }

        let total = qtd * valorPassagem;
        let totalComDesconto = total - (total * desconto);

        mensagem.innerHTML = `Total a pagar: R$ ${totalComDesconto.toFixed(2)}`;
    }
</script>
