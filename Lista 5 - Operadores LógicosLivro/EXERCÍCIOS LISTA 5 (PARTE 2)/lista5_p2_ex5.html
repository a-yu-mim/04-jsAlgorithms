<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">

    <title>Document</title>
</head>
<body>
    <h2>Desempenho Escolar: Como Está Sua Nota?</h2>
    
    Nota do aluno : 
    <input type="text" id="input_nota"><br><br>

    <button onclick="calculo()">Avaliar aluno</button>

</body>
</html>
<script>
    function calculo(){
        let nota = Number(input_nota.value);

        if(nota < 6){
            alert(`Aluno não aprovado`);
            } else if(nota >= 8.5 && nota <= 10){
            alert(`Aluno Exemplar!`);
            } else {
            alert(`Aluno comum e aprovado`);
            }
    }
    
</script>
