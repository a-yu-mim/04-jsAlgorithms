<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h2>Conforto Térmico: A Temperatura Está Ideal?</h2>
    
    Temperatura atual : 
    <input type="text" id="input_temp">

    <button onclick="calculo()">Ver situação</button>

</body>
</html>
<script>
    function calculo(){
        let temp = Number(input_temp.value);

        if(temp >= 21 && temp <= 24){
            alert(`Temperatura confortável :D`);
        } else {
            alert(`Temperatura DESCONFORTÁVEL :C`);
        }

    }
    
</script>
