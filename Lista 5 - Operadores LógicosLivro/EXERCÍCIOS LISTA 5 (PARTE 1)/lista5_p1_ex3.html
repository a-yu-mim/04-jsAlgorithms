<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h2>Validação de Notas: Seu Resultado é Aceitável?</h2>
    
    Nota do aluno : 
    <input type="text" id="input_nota"><br><br>

    <button onclick="calculo()">Avaliar aluno</button>

</body>
</html>
<script>
    function calculo(){
        let nota = Number(input_nota.value);

        if(nota >= 0 && nota <= 10){
            alert(`Nota válida!`);
        } else {
            alert(`Onde já se viu nota menor que 0 e maior que 10?!`);
        }

    }
    
</script>
