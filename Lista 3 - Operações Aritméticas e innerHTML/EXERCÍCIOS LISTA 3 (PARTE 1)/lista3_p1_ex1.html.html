<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h3>Idade:</h3>
    <input  id="input_idade" type="text"> 

    <!-- Colocando letra na caixa :
    <input id="input_idade" type="text" placeholder="Coloque sua idade aqui"> --> 

    <button onclick="aposentadoriaHomem()">Aposentadoria Homen</button> 
    <button onclick="aposentadoriaMulher()">Aposentadoria Mulher</button>
    <div id="div_mensagem"></div>
</body>
</html>

<script>
    function aposentadoriaHomem() {
        div_mensagem.innerHTML = "Faltam " + (70 - input_idade.value) + " anos para se aposentar";
    }

    function aposentadoriaMulher() {
        div_mensagem.innerHTML = " Faltam " + (60 - input_idade.value) + " anos para se aposentar";
    }
</script>
