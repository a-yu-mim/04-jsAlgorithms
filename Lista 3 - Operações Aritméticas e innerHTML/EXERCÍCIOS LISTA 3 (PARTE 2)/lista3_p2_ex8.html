<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    Valor da passagem de ônibus:
    <input type="text" id="input_passagem"><br><br>

    Quantidade de viagens por mês:
    <input type="text" id="input_quantidade"><br><br>

    Distância do trabalho até casa (km):
    <input type="text" id="input_distancia"><br><br>

    <button onclick="calcular()">Calcular VT</button>
    <div id="div_mensagem"></div>
</body>
</html>
<script>
    function calcular() {
      let passagem = Number(input_passagem.value);
      let quantidade = Number(input_quantidade.value);
      let distancia = Number(input_distancia.value);

      //90% em ônibus
      let qtdOnibus = quantidade * 0.9;
      let gastoOnibus = passagem * qtdOnibus;

      //10% em aplicativos
      let qtdApp = quantidade * 0.1;
      let custo = distancia * 0.75;
      let gastoApp = custo * qtdApp;
      
      let total= gastoOnibus + gastoApp;
      div_mensagem.innerHTML= `Você vai gastar R$${total} por mês com transporte.`
    }
</script>
