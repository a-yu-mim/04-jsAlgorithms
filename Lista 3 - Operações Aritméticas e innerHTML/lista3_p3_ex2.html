<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <input type="text" id="input_valor"><br><br>

    <button onclick="receber()">Depositar</button>
    <button onclick="tirar()">Retirar</button>
    <div id="div_mensagem"></div>
</body>
</html>
<script>
    let saldo = 0;

    function receber() {
        let valor = Number(input_valor.value);
        saldo = saldo + valor;
        div_mensagem.innerHTML = `Depósito de R$${valor} efetuado! Saldo atual: R$${saldo}.`
    }
    
    function tirar() {
        let valor = Number(input_valor.value);
        saldo = saldo - valor;
        div_mensagem.innerHTML = `Retirada de R$${valor} efetuado! Saldo atual: R$${saldo}.`
    }
</script>
