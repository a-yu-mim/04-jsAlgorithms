<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    Primeiro Número: <input type ="text" id="input_n1"> <br>
    Segundo Número: <input type ="text" id="input_n2"> <br>

    <button onclick="somar()">Somar</button>
    <button onclick="subtrair()">Subtrair</button>
    <button onclick="multiplicar()">Multiplicar</button>
    <button onclick="dividir()">Dividir</button>

    <div id="div_mensagem"></div>
</body>
</html>
<script>
    function somar(){ 
    let n1 = Number(input_n1.value);
    let n2 = Number(input_n2.value);
    let resultado = n1+n2;
div_mensagem.innerHTML = `A soma entre ${n1} e ${n2} é ${resultado}`;
    }

    function subtrair(){ 
    let n1 = Number(input_n1.value);
    let n2 = Number(input_n2.value);
    let resultado = n1-n2;
div_mensagem.innerHTML = `A diferença entre ${n1} e ${n2} é ${resultado}`;
    }

    function multiplicar(){ 
    let n1 = Number(input_n1.value);
    let n2 = Number(input_n2.value);
    let resultado = n1*n2;
div_mensagem.innerHTML = `O produto entre ${n1} e ${n2} é ${resultado}`;
    }

    function dividir(){ 
    let n1 = Number(input_n1.value);
    let n2 = Number(input_n2.value);
    let resultado = n1/n2;
div_mensagem.innerHTML = `A razão entre ${n1} e ${n2} é ${resultado}`;
    }
</script>
