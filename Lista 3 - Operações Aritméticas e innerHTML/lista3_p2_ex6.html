<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    Candidato A : <input type="text" id="input_A"><br>
    Candidato B : <input type="text" id="input_B"><br>
    Votos brancos : <input type="text" id="input_branco"><br>
    Votos nulos : <input type="text" id="input_nulo"><br><br>

    <button onclick="resumo()">Resultado da Eleição</button>
    <div id="div_mensagem"></div>
</body>
</html>
<script>
    function resumo(){
        let CadA= Number(input_A.value);
        let CadB= Number(input_B.value);
        let CadX= Number(input_branco.value);
        let CadN= Number(input_nulo.value);
        let total= CadA + CadB + CadX + CadN;
    div_mensagem.innerHTML = `<br> Total de votos: ${total} 
     <br><br> Candidato A: ${100*CadA/total}% (${CadA} votos) 
     <br><br> Candidato B: ${100*CadB/total}% (${CadB} votos)
     <br><br> Invalidos: ${100*(CadX + CadN)/total}% (${CadX + CadN} votos)`
    }
</script>
