<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h2> Controle Diário de Viagens </h2>

Distância (km) :
<input type="number" id="input_km"><br><br>

Pedágio (R$):
<input type="number" id="input_pedagio"><br><br>

Bandeira: 
<select id="select_bandeira"> 
    <option>1</option>
    <option>2</option>
    <option>3</option>
</select><br><br>

<button onclick="calculo()">Acumular corrida realizada</button>
<div id="div_mensagem"></div>

</body>
</html>
<script>
    let acumulado = 0;
    let contador = 0;

function calculo(){
    let bandeira = Number(select_bandeira.value);
    let km = Number(input_km.value);
    let pedagio = Number(input_pedagio.value);
    
    let valor = (10 / 8) * km;

    if(km > 50){
        valor = valor * 0.9; 
    }

    valor += pedagio;

    if(bandeira == 1){
        valor = valor * 0.965;
    } else if(bandeira == 2){
        valor = valor * 1.117;
    } else if(bandeira == 3){
        valor = valor * 1.223;
    }

    acumulado += valor;
    contador++;

    div_mensagem.innerHTML += `${contador}ª corrida de ${km} km com valor de R$ ${valor.toFixed(2)} 
    – ACUMULADO DO DIA R$ ${acumulado.toFixed(2)} <br><br>`
}
   
</script>
