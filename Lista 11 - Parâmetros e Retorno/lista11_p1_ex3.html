<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    Retorne todas as vogais do texto (como se removesse as consoantes).<br>
    <input type="text" id="input_texto" placeholder="texto">
    <button onclick="verificar()">Verificar</button><br><br>
    <div id="div_mensagem"></div>
</body>
</html>
<script>
//------------------Exercício 3:-------------------
function verificar(){
    let texto = input_texto.value;
    let vogais = "aeiouAEIOU";
    let resultado = "";

    for(let i = 0; i < texto.length; i++){
        for(let j = 0; j < vogais.length; j++){
            if(texto[i] == vogais[j]){
                resultado += texto[i];
            }
        }
    }
    div_mensagem.innerHTML = resultado;
    return resultado;
}

</script>
