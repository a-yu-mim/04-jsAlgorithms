<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h2>Filmes em Cores: Azul e Vermelho Alternados</h2>

    Informe seus filmes favoritos:
    <input type="text" id="input_filmes">
    <button onclick="cadastrar()">Cadastrar</button><br><br>
    <div id="div_mensagem"></div>
</body>
</html>
<script>
    let listaFilmes = [];
    let mensagem = '';

    function cadastrar(){
        let filme = input_filmes.value;

        for(let i = 0; i < listaFilmes.length; i++){
            if(i % 2 == 0){
            mensagem += `<span style="color:blue">${listaFilmes[i]}</span><br>`;
            } else{
            mensagem += `<span style="color:red">${listaFilmes[i]}</span><br>`;
            }
        }
        div_mensagem.innerHTML = mensagem;
        input_filmes.value = '';
    }
</script>
