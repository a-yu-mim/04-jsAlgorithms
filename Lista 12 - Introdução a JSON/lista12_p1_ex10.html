<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    Marca do celular:<br>
    <input type="text" id="input_marca"><br>
    Modelo:<br>
    <input type="text" id="input_modelo"><br>
    Preço:<br>
    <input type="text" id="input_preco">
    <button onclick="cadastrar()">Cadastrar Celular</button><br><br>
    <div id="div_mensagem"></div>
</body>
</html>
<script>
    function cadastrar(){
        let celular = {
            marca: input_marca.value,
            modelo: input_modelo.value,
            preco: Number(input_preco.value)
        };

        celular.precoDesconto = celular.preco * (1 - 0.15);

        div_mensagem.innerHTML += `
        Marca: ${celular.marca}<br>
        Modelo: ${celular.modelo}<br>
        Preço Original: R$${celular.preco.toFixed(2)}<br>
        Preço com Desconto: R$${celular.precoDesconto.toFixed(2)}<br><br>
        `
    }
</script>
