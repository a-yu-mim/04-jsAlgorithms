<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    Nome do aluno:<br>
    <input type="text" id="input_nome"><br><br>

    Nota:<br>
    <input type="text" id="input_nota"><br><br>

    Frequência:<br>
    <input type="text" id="input_frequencia"><br><br>
    <button onclick="analisar()">Analisar Aluno</button>
    <div id="div_mensagem"></div>
</body>
</html>
<script>
 function analisar(){
    let aluno = {
        nome: input_nome.value,
        nota: Number(input_nota.value),
        frequencia: Number(input_frequencia.value)
    }

    if(aluno.nota >= 6 && aluno.frequencia >= 75){
        aluno.situacao = `Aprovado`;
    } else {
    aluno.situacao = `Reprovado`;
    }

    div_mensagem.innerHTML += `
    Aluno: ${aluno.nome}<br>
    Nota: ${aluno.nota}<br>
    Frequência: ${aluno.frequencia}%<br>
    Situação: ${aluno.situacao}<br><br>
    `
 }

</script>
