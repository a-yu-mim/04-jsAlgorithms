<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h2>Números Primos</h2>

    Insira um número:
    <input type="text" id="input_numero">
    <button onclick="conta()">Ver Divisores</button><br><br>
    <div id="div_mensagem"></div>
</body>
</html>
<script>
    function conta(){
        let numero = Number(input_numero.value);
        let contador = 1;
        let mensagem = '';
        let qtdDivisores = 0;
        
        mensagem += `Dividores do Número ${numero}: <br><br>`;

        while(contador <= numero){
            if(numero % contador == 0){
                mensagem += `${contador}<br>`
                qtdDivisores++;
            }
            contador++;
        }

        if(qtdDivisores == 2){
           mensagem += `<br>O número ${numero} é primo.`;

        }
        div_mensagem.innerHTML = mensagem;
    }
</script>
