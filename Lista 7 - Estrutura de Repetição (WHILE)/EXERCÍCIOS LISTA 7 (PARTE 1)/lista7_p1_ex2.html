<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h2>Frase Repetitiva</h2>
    <button onclick="repeticao()">Diga algo sobre a matéria de Algoritmos</button>
    <div id="div_mensagem"></div>
</body>
</html>
<script>
    let contador = 0;
    let mensagem = '';

    function repeticao(){

        while(contador < 7){
        contador ++;
        mensagem += `Algoritmos é para mim!<br>`;  
        }
        
        div_mensagem.innerHTML = mensagem;
    }
    
</script>
