<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h2>Viva o 7!</h2>
    Insira um número entre 0 e 200:
    <input type="text" id="input_num">
    
    <button onclick="repeticao()">Viva o 7!</button>
    <div id="div_mensagem"></div>
</body>
</html>
<script>
    
    function repeticao(){
        let numero = Number(input_num.value);
        let mensagem = '';
        
if(numero => 0 && numero <= 200){
    let contador = 0;

        while(contador <= numero){
            if (contador % 7 == 0){
                mensagem += `${contador} <br>`;  
            }

            contador++;
        } div_mensagem.innerHTML = mensagem;

} else {
    alert(`Inserir valor valido!`);
}
    }
</script>
