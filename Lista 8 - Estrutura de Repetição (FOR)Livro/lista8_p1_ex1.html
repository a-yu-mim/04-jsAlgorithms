<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h2>Carona Compartilhada</h2>

    Quantas pessoas vão entrar no carro?
    <input type="text" id="input_pessoas">

    <button onclick="fun()">#PartiuCarona</button>
    <div id="div_mensagem"></div>
</body>
</html>
<script>
    function fun(){
    let mensagem ='';
    let n = Number(input_pessoas.value);

    for(let i = 1; i <= n; i++ ){
       if(i == 1) {
        mensagem += `Entrou o ${i}º passageiro (que é o(a) motorista)<br>`
        } else if(i <= 5){
        mensagem += `Entrou o ${i}º passageiro<br>`
        }else{
        mensagem += `O ${i}º passageiro terá que esperar!<br>`
        }
    }
        div_mensagem.innerHTML = mensagem
 }
</script>
