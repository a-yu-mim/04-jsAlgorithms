<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
<h2>Relembrando Moradias: Onde Você Já Viveu?</h2>
    
    Bairros que já morou: 
    <input type="text" id="input_bairro">
    <button onclick="cadastro()">Cadastrar bairro</button><br><br>

    Número da moradia:
    <input type="text" id="input_numero">
    <button onclick="relembrar()">Relembrar moradia</button>
    <div id="div_mensagem"></div>
</body>
</html>
<script>
    let lista = [];
    

    function cadastro(){
        let bairro = input_bairro.value;
        lista.push(bairro);
        div_mensagem.innerHTML = `Cadastrado com sucesso!`

        input_bairro.value = '';
    }

    function relembrar(){
        let numero = Number(input_numero.value);
    if(numero > lista.length){
        div_mensagem.innerHTML = `Você ainda não morou num ${numero}º bairro`;
    } else{
        div_mensagem.innerHTML = lista[numero - 1];
    }
    
        input_numero.value = '';
    }
</script>
