<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
  <h2>Diário de Viagens: Do Primeiro ao Último Destino</h2>

  Destino de viagem :  
  <input type="text" id="input_destino">
  <button onclick="adicionarDestino()">Adicionar</button>
  <br><br>

  <button onclick="primeira()">Primeira viagem</button>
  <button onclick="terceira()">Terceira viagem</button>
  <button onclick="ultima()">Última viagem</button>

  <div id="div_mensagem"></div>
</body>
</html>
<script>
let lista = [];


function adicionarDestino(){
  let destino = input_destino.value;
  if (destino != "") {
    lista.push(destino); 
    div_mensagem.innerHTML = `Adicionado!!`
  } 

  input_destino.value = '';
}


function primeira(){
  if (lista.length > 0){
    div_mensagem.innerHTML = `Primeira viagem:` + lista[0];
    }else {
    div_mensagem.innerHTML = `Ainda não viajou`
  }
}


function terceira(){
  if (lista.length > 2){
    div_mensagem.innerHTML = `Terceira viagem:` + lista[2];
    }else {
    div_mensagem.innerHTML = `Ainda não fez a terceira viagem`
  }
}


function ultima(){
  if (lista.length > 0){
    div_mensagem.innerHTML = `Última viagem:` + lista[lista.length -1];
    }else {
    div_mensagem.innerHTML = `Ainda não viajou`
  }
}


</script>
