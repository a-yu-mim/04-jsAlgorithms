<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
  <h2>Caça às Frutas: Descubra se está na Lista</h2>

  Digite nome de uma fruta :  
  <input type="text" id="input_fruta">

  <button onclick="pesquisar()">Pesquisar</button>

  <div id="div_mensagem"></div>
</body>
</html>
<script>

  let lista = ['maçã', 'banana', 'uva', 'laranja'];

  function pesquisar(){

  let fruta = input_fruta.value.toLowerCase(); 
  let posicao = lista.indexOf(fruta); 
 
  if (posicao != -1) { 
  div_mensagem.innerHTML = `A fruta ${fruta} existe na lista na posição ${posicao + 1}`;
  } else {
  div_mensagem.innerHTML = `Não existe fruta ${fruta} na lista`;
  }
}

</script>
