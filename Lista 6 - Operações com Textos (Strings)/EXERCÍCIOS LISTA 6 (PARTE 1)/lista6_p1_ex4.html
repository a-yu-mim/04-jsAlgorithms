<!doctype html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
</head>

<body>
    <h2>Comparador de Palavras</h2>

    Palavra 1:
    <input type="text" id="input_p1"><br>

    Palavra 2:
    <input type="text" id="input_p2"><br><br>

    <button onclick="analisar()">Analisar Palavras</button>
    <div id="div_mensagem"></div>
</body>
</html>

<script>
function analisar() {
  let palavra1 = input_p1.value;
  let palavra2 = input_p2.value;

  if (palavra1 == palavra2) {
      div_mensagem.innerHTML = `As palavras ${palavra1} e ${palavra2} são exatamente iguais!`;

// .toUpperCase() → tudo MAIÚSCULO
// .toLowerCase() → tudo minúsculo

    } else if (palavra1.toUpperCase() == palavra2.toUpperCase()) {
      div_mensagem.innerHTML = `As palavras ${palavra1} e ${palavra2} possuem o mesmo conteúdo, 
      mas a digitação é diferente (maiúsculas e minúsculas)`;
    
    } else {
      div_mensagem.innerHTML = `As palavras ${palavra1} e ${palavra2} são completamente diferentes!`;
    }
}
</script>
