<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Três Números da Sorte</title>
</head>
<body>
    Nome:<br>
    <input id="input_nome"><br><br>

    1º número da sorte (1 a 100):<br>
    <input id="input_num1"><br><br>

    2º número da sorte (1 a 100):<br>
    <input id="input_num2"><br><br>

    3º número da sorte (1 a 100):<br>
    <input id="input_num3"><br><br>

    <button onclick="sortear()">Sortear</button><br><br>
    <div id="div_mensagem"></div>

    <script>
        let sorteios = 0;

        function sortear() {
            let nome = input_nome.value;
            let num1 = Number(input_num1.value);
            let num2 = Number(input_num2.value);
            let num3 = Number(input_num3.value);

            if (input_num1.value == "" && input_num2.value == "" && input_num3.value == "") {
                alert("Digite de 1 a 3 números entre 1 e 100.");
                return;
            }

            if (input_num1.value != "" && (num1 < 1 || num1 > 100)) {
                alert("Digite números entre 1 e 100.");
                return;
            }

            if (input_num2.value != "" && (num2 < 1 || num2 > 100)) {
                alert("Digite números entre 1 e 100.");
                return;
            }

            if (input_num3.value != "" && (num3 < 1 || num3 > 100)) {
                alert("Digite números entre 1 e 100.");
                return;
            }

            sorteios++;
            let numeroSorteado = Number((Math.random() * 99 + 1).toFixed(0));

            if (numeroSorteado == num1 || numeroSorteado == num2 || numeroSorteado == num3) {
                div_mensagem.innerHTML = "Parabéns, " + nome + " o seu número da sorte " + numeroSorteado + " foi sorteado após " + sorteios + " sorteios!";
            } else {
                div_mensagem.innerHTML = "Número sorteado: " + numeroSorteado;
            }
        }
    </script>
</body>
</html>
