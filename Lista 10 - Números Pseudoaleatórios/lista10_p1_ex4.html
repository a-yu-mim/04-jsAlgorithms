<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Documento</title>
</head>
<body>
    <button onclick="sortearNota()">Sortear Nota para aluno</button><br><br>
    <div id="div_num"></div>
</body>
</html>
<script>
    function sortearNota(){
        let nota = (Math.random() * 10).toFixed(1);
        div_num.innerHTML = nota;
    }
</script>
