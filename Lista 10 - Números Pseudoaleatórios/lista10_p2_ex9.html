<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aprovação do Aluno</title>
</head>
<body>
    <button onclick="gerarNota()">Gerar uma nota de aluno entre 3 e 10</button><br><br>
    <div id="div_nota">Nota: -</div><br>

    <button onclick="gerarFrequencia()">Gerar uma frequência de aluno entre 50 e 100</button><br><br>
    <div id="div_frequencia">Frequência: -</div><br>

    <button onclick="verAprovacao()">Ver Aprovação</button><br><br>
    <div id="div_resultado"></div>

    <script>
        let nota = "";
        let frequencia = "";

        function gerarNota() {
            nota = ((Math.random() * 7) + 3).toFixed(1);
            div_nota.innerHTML = "Nota: " + nota;
        }

        function gerarFrequencia() {
            frequencia = ((Math.random() * 50) + 50).toFixed(1);
            div_frequencia.innerHTML = "Frequência: " + frequencia;
        }

        function verAprovacao() {
            if (nota == "" || frequencia == "") {
                div_resultado.innerHTML = "Gere a nota e a frequência primeiro.";
                return;
            }

            let situacao = "reprovado";

            if (Number(nota) >= 6 && Number(frequencia) >= 75) {
                situacao = "aprovado";
            }

            div_resultado.innerHTML = "Com nota " + nota + " e frequência " + frequencia + ", o aluno está " + situacao + "!";
        }
    </script>
</body>
</html>
