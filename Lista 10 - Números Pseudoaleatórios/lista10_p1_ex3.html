<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Documento</title>
    <style>
        #div_num {
            width: 100px;
            height: 100px;
            background-color: black;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 34px;
        }
    </style>
</head>
<body>
    <button onclick="sorteio()">jogar dado</button><br><br>
    <div id="div_num"></div>
</body>
</html>
<script>
    function sorteio(){
        let num = ((Math.random() * 19) + 1).toFixed(0);
        div_num.innerHTML = num;
    }
</script>
