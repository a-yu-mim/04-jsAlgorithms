<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Número Cabalístico</title>
</head>
<body>
    <button onclick="sortearNumero()">Quero um número cabalístico!</button><br><br>
    <div id="div_numero"></div>
    <div id="div_mensagem"></div>

    <script>
        function sortearNumero() {
            let numero = Number((Math.random() * 14 + 1).toFixed(0));
            
            if (numero == 3 || numero == 4 || numero == 7 || numero == 10 || numero == 12) {
                div_mensagem.innerHTML = "Eu S2 números cabalísticos!";
            } else {
                div_mensagem.innerHTML = "Ah, me dá um número bom na próxima!";
            }
            div_numero.innerHTML = numero;
        }
    </script>
</body>
</html>
