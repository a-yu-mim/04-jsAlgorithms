<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Situação do Aluno</title>
</head>
<body>
    <button onclick="gerarNota()">Gerar uma nota de aluno entre 0 e 10</button><br><br>
    <div id="div_nota">Nota: -</div><br>

    <button onclick="gerarFrequencia()">Gerar uma frequência de aluno entre 0 e 100</button><br><br>
    <div id="div_frequencia">Frequência: -</div><br>

    <button onclick="verSituacao()">Ver Situação</button>

    <script>
        let nota = "";
        let frequencia = "";

        function gerarNota() {
            nota = (Math.random() * 10).toFixed(2);
            div_nota.innerHTML = "Nota: " + nota;
        }

        function gerarFrequencia() {
            frequencia = (Math.random() * 100).toFixed(2);
            div_frequencia.innerHTML = "Frequência: " + frequencia;
        }

        function verSituacao() {
            if (nota == "" || frequencia == "") {
                alert("Gere a nota e a frequência primeiro.");
                return;
            }
            alert("Situação do aluno:\nNota: " + nota + "\nFrequência: " + frequencia);
        }
    </script>
</body>
</html>
